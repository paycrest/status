# Change these first
owner: paycrest # Your GitHub organization or username, where this repository lives
repo: status # The name of this repository

sites:
  - name: Aggregator
    url: https://api.paycrest.io/health
    expectedStatusCodes:
      - 200
      - 301

  - name: Noblocks
    url: https://noblocks.xyz
    expectedStatusCodes:
      - 200
      - 301

  - name: Noblocks Rates
    url: https://rates.noblocks.xyz
    expectedStatusCodes:
      - 200
      - 301

  - name: NIBBS (Funds Transfer)
    url: https://public-api.freshstatus.io/v1/public-components/?account_id=21373
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"id":180641,"name":"Funds Transfer (FT)","description":"","order":1,"group_id":31463,"display_options":{"service_start_date":"","uptime_history_enabled":"true"},"status":"OP"'

  - name: NIBBS (Transaction Status Query)
    url: https://public-api.freshstatus.io/v1/public-components/?account_id=21373
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"id":180644,"name":"Transaction Status Query (TSQ)","description":"","order":2,"group_id":31463,"display_options":{"service_start_date":"","uptime_history_enabled":"true"},"status":"OP"'

  - name: NIBBS (Name Enquiry)
    url: https://public-api.freshstatus.io/v1/public-components/?account_id=21373
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"id":181552,"name":"Name Enquiry (NE)","description":"","order":3,"group_id":31463,"display_options":{"service_start_date":"","uptime_history_enabled":"true"},"status":"OP"'

  - name: Dashboard
    url: https://app.paycrest.io
    expectedStatusCodes:
      - 200
      - 301

  - name: Landing page
    url: https://paycrest.io

status-website:
  cname: status.paycrest.io # Replace with your custom domain, or remove if not using one
  logoUrl: https://avatars.githubusercontent.com/u/128634635?s=200&v=4
  name: Paycrest
  introTitle: "**Service Status**"
  introMessage: >-
    This page shows real-time status of our services.
    Powered by [Upptime](https://github.com/upptime/upptime).
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://paycrest.io

# Notifications
#
# email: requires the usual notifme SMTP secrets set in the repo
#   (NOTIFICATION_EMAIL_SMTP_HOST, NOTIFICATION_EMAIL_SMTP_PORT,
#    NOTIFICATION_EMAIL_SMTP_USERNAME, NOTIFICATION_EMAIL_SMTP_PASSWORD,
#    NOTIFICATION_EMAIL_SMTP_FROM). Without them the email entry is a no-op.
#
# slack: create an Incoming Webhook for #github-alerts in paycrest-io.slack.com
#   and store the webhook URL as the repo secret NOTIFICATION_SLACK_WEBHOOK_URL.
notifications:
  - type: email
    address: engineering@paycrest.io
  - type: slack
    channel: "#github-alerts"

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *" # Every 5 minutes
