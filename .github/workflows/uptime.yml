# Uptime CI
#
# Note: stock Upptime regenerates this file from the upstream template on
# schedule, but `update-template.yml` is disabled in this repo so our
# customisations (the per-check NDJSON append step below) survive.
#
# After upptime/uptime-monitor finishes a check pass, we read each
# history/<slug>.yml and append one line to data/checks/<slug>.ndjson —
# giving us a true per-check time-series the Astro site can render as
# 15-minute candles. Without this, Upptime only commits when the response
# time drifts past its internal threshold, so most checks would leave no
# visible trace in master's git history.

name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check endpoint status
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}

      # Pull in any history/*.yml updates the upptime-monitor step may have
      # committed and pushed in this run, so our append script reads the
      # freshest file content rather than what we checked out at job start.
      - name: Pull post-upptime commits
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: Append per-check NDJSON
        run: node .github/scripts/append-check-log.mjs

      - name: Commit and push NDJSON updates
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain data/checks 2>/dev/null)" ]; then
            echo "no NDJSON changes; nothing to commit"
            exit 0
          fi
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add data/checks
          git commit -m ":bar_chart: Append per-check log [skip ci]"
          # Retry-on-race: if another upptime run pushed between our
          # checkout and now, rebase and try again up to 3 times.
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          echo "failed to push after 3 attempts" >&2
          exit 1
