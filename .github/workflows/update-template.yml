# This workflow is intentionally disabled.
#
# The original Upptime update-template workflow regenerates all workflow
# files (including site.yml) from the upstream Upptime template. We use a
# custom Astro site instead of the stock Sapper template, so we cannot let
# this workflow run — it would overwrite our customisations.
#
# If you ever want Upptime template updates again, re-enable the triggers
# below. You'll then also need to revert site.yml and delete the site/
# directory.

name: Update Template CI (disabled)
on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "update-template is disabled; see file header for why."
