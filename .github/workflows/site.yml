# Custom status site workflow.
#
# Replaces the default Upptime Sapper template with a hand-built Astro site
# under ./site that consumes history/summary.json and history/*.yml.
#
# Do NOT let `update-template.yml` regenerate this file — that workflow has
# been disabled in this repo for exactly this reason.
#
# Triggers:
#   - schedule: every 5 min so the "Last checked" timestamp stays fresh
#     even when no history data actually changes.
#   - push: on master for merges that touch the site, workflow, or data.
#   - repository_dispatch / workflow_dispatch: escape hatches.
#
# Each build stamps BUILD_TIME into the generated HTML so peaceiris always
# sees a diff and pushes a new gh-pages commit — that in turn triggers the
# built-in "pages build and deployment" workflow.

name: Static Site CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "history/summary.json"
      - "site/**"
      - ".github/workflows/site.yml"

jobs:
  build-and-deploy:
    name: Build and deploy site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          SITE_BASE: /status
          BUILD_TIME: ${{ github.event.repository.updated_at }}
        run: |
          export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "BUILD_TIME=$BUILD_TIME"
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: site/dist
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
