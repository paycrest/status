# This workflow is intentionally disabled.
#
# The original Upptime setup workflow runs the stock `update-template` step
# (which overwrites our custom site.yml back to the Sapper template) and
# the `site` command (which mkdirs a `site/` folder — colliding with our
# Astro project directory and failing with EEXIST).
#
# Critically, the original setup.yml also had a `push: paths: [.upptimerc.yml]`
# trigger, so every time `.upptimerc.yml` was edited it auto-ran and reset
# all our workflow customisations. Neutralising it is required to keep our
# custom site.yml stable.
#
# If you ever want to re-bootstrap Upptime (e.g. migrating off our custom
# site), re-enable the triggers below and restore the original jobs.

name: Setup CI (disabled)
on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "setup is disabled; see file header for why."
